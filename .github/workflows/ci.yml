name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: ruff check releaseguard tests
      - run: pytest -q
      - name: render html report
        if: always()
        run: |
          if [ -f runs/report.json ]; then
            rg report runs/report.json --html runs/report.html
          fi
      - name: upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: releaseguard-report
          path: runs/
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: releaseguard:ci
